<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌿 治愈拼图 - Healing Puzzle</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg-primary: #f0f4f8;
    --bg-secondary: #e2e8f0;
    --accent: #7c9eb2;
    --accent-light: #a8c4d8;
    --accent-dark: #5a7d94;
    --text: #4a5568;
    --text-light: #718096;
    --white: #ffffff;
    --shadow: rgba(124, 158, 178, 0.15);
    --success: #9ae6b4;
    --pink: #fbb6ce;
    --lavender: #c4b5fd;
  }

  body {
    font-family: 'Noto Sans SC', sans-serif;
    background: var(--bg-primary);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  /* 飘落的花瓣背景动画 */
  .petals-container {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }

  .petal {
    position: absolute;
    top: -30px;
    width: 12px;
    height: 12px;
    background: radial-gradient(ellipse at center, #fbb6ce 0%, #f687b3 100%);
    border-radius: 50% 0 50% 0;
    opacity: 0.6;
    animation: petal-fall linear infinite;
  }

  @keyframes petal-fall {
    0% {
      transform: translateY(-10px) rotate(0deg) translateX(0);
      opacity: 0.6;
    }
    25% {
      transform: translateY(25vh) rotate(90deg) translateX(30px);
    }
    50% {
      transform: translateY(50vh) rotate(180deg) translateX(-20px);
      opacity: 0.5;
    }
    75% {
      transform: translateY(75vh) rotate(270deg) translateX(25px);
    }
    100% {
      transform: translateY(105vh) rotate(360deg) translateX(-10px);
      opacity: 0;
    }
  }

  /* 头部 */
  .header {
    text-align: center;
    padding: 30px 20px 10px;
    position: relative;
    z-index: 1;
  }

  .header h1 {
    font-size: 2rem;
    font-weight: 300;
    color: var(--accent-dark);
    letter-spacing: 4px;
    margin-bottom: 6px;
  }

  .header p {
    font-size: 0.9rem;
    color: var(--text-light);
    font-weight: 300;
  }

  /* 控制栏 */
  .controls {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 12px;
    padding: 16px 20px;
    flex-wrap: wrap;
    position: relative;
    z-index: 1;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 10px 20px;
    border: none;
    border-radius: 24px;
    font-size: 0.88rem;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.3s ease;
    font-weight: 400;
    letter-spacing: 0.5px;
  }

  .btn-primary {
    background: linear-gradient(135deg, var(--accent-light), var(--accent));
    color: white;
    box-shadow: 0 4px 15px rgba(124, 158, 178, 0.3);
  }

  .btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(124, 158, 178, 0.4);
  }

  .btn-secondary {
    background: var(--white);
    color: var(--text);
    border: 1px solid var(--bg-secondary);
    box-shadow: 0 2px 8px var(--shadow);
  }

  .btn-secondary:hover {
    border-color: var(--accent-light);
    color: var(--accent-dark);
  }

  .btn-icon {
    width: 42px;
    height: 42px;
    padding: 0;
    justify-content: center;
    border-radius: 50%;
    font-size: 1.2rem;
  }

  .btn .icon { font-size: 1.1rem; }

  /* 难度选择 */
  .difficulty-bar {
    display: flex;
    justify-content: center;
    gap: 8px;
    padding: 0 20px 16px;
    position: relative;
    z-index: 1;
  }

  .diff-btn {
    padding: 8px 18px;
    border: 1.5px solid var(--bg-secondary);
    border-radius: 20px;
    background: var(--white);
    color: var(--text-light);
    font-size: 0.82rem;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.3s ease;
    font-weight: 400;
  }

  .diff-btn:hover {
    border-color: var(--accent-light);
    color: var(--accent);
  }

  .diff-btn.active {
    background: linear-gradient(135deg, var(--accent-light), var(--accent));
    color: white;
    border-color: transparent;
    box-shadow: 0 3px 12px rgba(124, 158, 178, 0.3);
  }

  /* 游戏区域 */
  .game-area {
    display: flex;
    justify-content: center;
    align-items: flex-start;
    gap: 30px;
    padding: 10px 30px 30px;
    flex-wrap: wrap;
    position: relative;
    z-index: 1;
  }

  /* 预览图 */
  .preview-panel {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }

  .preview-label {
    font-size: 0.82rem;
    color: var(--text-light);
    font-weight: 300;
    letter-spacing: 1px;
  }

  .preview-canvas {
    border-radius: 12px;
    box-shadow: 0 4px 20px var(--shadow);
    opacity: 0.85;
    transition: opacity 0.3s;
    border: 3px solid white;
  }

  .preview-canvas:hover {
    opacity: 1;
  }

  /* 拼图板 */
  .puzzle-board {
    position: relative;
    border-radius: 12px;
    background: var(--white);
    box-shadow: 0 4px 20px var(--shadow);
    border: 3px solid white;
    overflow: hidden;
  }

  .puzzle-board canvas {
    display: block;
    border-radius: 9px;
  }

  /* 进度信息 */
  .progress-bar {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 20px;
    padding: 10px 20px 20px;
    position: relative;
    z-index: 1;
    flex-wrap: wrap;
  }

  .progress-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 0.85rem;
    color: var(--text-light);
    font-weight: 300;
  }

  .progress-item .num {
    font-size: 1.1rem;
    font-weight: 500;
    color: var(--accent-dark);
  }

  /* 完成弹窗 */
  .modal-overlay {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(240, 244, 248, 0.9);
    backdrop-filter: blur(8px);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 100;
    animation: fade-in 0.5s ease;
  }

  .modal-overlay.show {
    display: flex;
  }

  @keyframes fade-in {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  .modal {
    background: var(--white);
    border-radius: 24px;
    padding: 40px 50px;
    text-align: center;
    box-shadow: 0 20px 60px rgba(124, 158, 178, 0.2);
    animation: modal-pop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    max-width: 90vw;
  }

  @keyframes modal-pop {
    from { transform: scale(0.8); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }

  .modal .emoji { font-size: 3.5rem; margin-bottom: 16px; }
  .modal h2 {
    font-size: 1.6rem;
    font-weight: 300;
    color: var(--accent-dark);
    margin-bottom: 10px;
    letter-spacing: 2px;
  }
  .modal p {
    font-size: 0.9rem;
    color: var(--text-light);
    margin-bottom: 24px;
    font-weight: 300;
  }

  /* 音量控制 */
  .volume-control {
    display: flex;
    align-items: center;
    gap: 8px;
    position: fixed;
    bottom: 20px;
    right: 20px;
    z-index: 10;
    background: var(--white);
    padding: 8px 14px;
    border-radius: 24px;
    box-shadow: 0 2px 12px var(--shadow);
    border: 1px solid var(--bg-secondary);
  }

  .volume-control input[type="range"] {
    width: 80px;
    height: 4px;
    -webkit-appearance: none;
    appearance: none;
    background: var(--bg-secondary);
    border-radius: 2px;
    outline: none;
  }

  .volume-control input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
  }

  .volume-label {
    font-size: 0.8rem;
    color: var(--text-light);
    cursor: pointer;
    user-select: none;
  }

  /* 提示文字 */
  .hint {
    text-align: center;
    font-size: 0.82rem;
    color: var(--text-light);
    font-weight: 300;
    padding: 6px 20px;
    position: relative;
    z-index: 1;
    letter-spacing: 0.5px;
  }

  /* 主题选择 */
  .theme-bar {
    display: flex;
    justify-content: center;
    gap: 10px;
    padding: 0 20px 10px;
    position: relative;
    z-index: 1;
    flex-wrap: wrap;
  }

  .theme-btn {
    padding: 7px 16px;
    border: 1.5px solid var(--bg-secondary);
    border-radius: 18px;
    background: var(--white);
    color: var(--text-light);
    font-size: 0.8rem;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.3s ease;
  }
  .theme-btn:hover { border-color: var(--accent-light); }
  .theme-btn.active {
    background: linear-gradient(135deg, var(--lavender), var(--pink));
    color: white;
    border-color: transparent;
  }

  /* 动画 */
  @keyframes piece-snap {
    0% { transform: scale(1.1); }
    50% { transform: scale(0.95); }
    100% { transform: scale(1); }
  }

  .snap-anim {
    animation: piece-snap 0.3s ease;
  }

  /* 响应式 */
  @media (max-width: 768px) {
    .game-area {
      flex-direction: column;
      align-items: center;
      padding: 10px 15px 30px;
      gap: 15px;
    }
    .header h1 { font-size: 1.5rem; }
    .controls { gap: 8px; padding: 12px 15px; }
    .btn { padding: 8px 14px; font-size: 0.82rem; }
  }
</style>
</head>
<body>

<!-- 飘落花瓣 -->
<div class="petals-container" id="petals"></div>

<!-- 头部 -->
<div class="header">
  <h1>🌿 治愈拼图</h1>
  <p>慢下来，感受每一片的归处</p>
</div>

<!-- 主题选择 -->
<div class="theme-bar">
  <button class="theme-btn active" data-theme="cherry">🌸 樱花</button>
  <button class="theme-btn" data-theme="ocean">🌊 海洋</button>
  <button class="theme-btn" data-theme="forest">🌲 森林</button>
  <button class="theme-btn" data-theme="starry">🌙 星空</button>
</div>

<!-- 难度 -->
<div class="difficulty-bar">
  <button class="diff-btn" data-size="3">简单 3×3</button>
  <button class="diff-btn active" data-size="4">舒适 4×4</button>
  <button class="diff-btn" data-size="5">挑战 5×5</button>
</div>

<!-- 控制 -->
<div class="controls">
  <button class="btn btn-primary" id="btn-shuffle">
    <span class="icon">🔀</span> 打乱拼图
  </button>
  <button class="btn btn-secondary" id="btn-show-original">
    <span class="icon">👁️</span> 预览
  </button>
  <button class="btn btn-secondary btn-icon" id="btn-sound" title="音效开关">
    🔊
  </button>
  <button class="btn btn-secondary btn-icon" id="btn-music" title="背景乐开关">
    🎵
  </button>
</div>

<!-- 提示 -->
<div class="hint" id="hint-text">拖动碎片到正确位置，听一听它们归位的轻响 🌿</div>

<!-- 进度 -->
<div class="progress-bar">
  <div class="progress-item">
    <span>已完成</span>
    <span class="num" id="pieces-done">0</span>
    <span>/</span>
    <span class="num" id="pieces-total">16</span>
  </div>
  <div class="progress-item">
    <span>用时</span>
    <span class="num" id="timer">00:00</span>
  </div>
  <div class="progress-item">
    <span>移动</span>
    <span class="num" id="moves">0</span>
    <span>次</span>
  </div>
</div>

<!-- 游戏区域 -->
<div class="game-area">
  <div class="preview-panel">
    <span class="preview-label">✨ 原图参考</span>
    <canvas class="preview-canvas" id="preview-canvas" width="180" height="180"></canvas>
  </div>
  <div class="puzzle-board">
    <canvas id="puzzle-canvas"></canvas>
  </div>
</div>

<!-- 完成弹窗 -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="emoji">🎉</div>
    <h2>拼图完成！</h2>
    <p id="modal-msg">你用了 <strong>--</strong> 次移动，耗时 <strong>--</strong></p>
    <button class="btn btn-primary" onclick="closeModal()">
      <span class="icon">🔄</span> 再来一局
    </button>
  </div>
</div>

<!-- 音量控制 -->
<div class="volume-control">
  <span class="volume-label" id="vol-label">🔊</span>
  <input type="range" id="volume-slider" min="0" max="100" value="50">
</div>

<script>
// ========== 音频系统 ==========
const AudioSystem = {
  ctx: null,
  bgOsc: null,
  bgGain: null,
  masterGain: null,
  soundOn: true,
  musicOn: true,
  volume: 0.5,
  musicPlaying: false,

  init() {
    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
    this.masterGain = this.ctx.createGain();
    this.masterGain.gain.value = this.volume;
    this.masterGain.connect(this.ctx.destination);
  },

  ensureCtx() {
    if (!this.ctx) this.init();
    if (this.ctx.state === 'suspended') this.ctx.resume();
  },

  // 碎片归位音效 - 温柔的钟琴声
  playSnap() {
    if (!this.soundOn) return;
    this.ensureCtx();
    const ctx = this.ctx;
    const now = ctx.currentTime;

    // 主音 - 清脆的钟琴声
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(880, now);
    osc.frequency.exponentialRampToValueAtTime(660, now + 0.3);
    gain.gain.setValueAtTime(0.15, now);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.5);
    osc.connect(gain).connect(this.masterGain);
    osc.start(now);
    osc.stop(now + 0.5);

    // 泛音
    const osc2 = ctx.createOscillator();
    const gain2 = ctx.createGain();
    osc2.type = 'sine';
    osc2.frequency.setValueAtTime(1320, now);
    gain2.gain.setValueAtTime(0.06, now);
    gain2.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
    osc2.connect(gain2).connect(this.masterGain);
    osc2.start(now);
    osc2.stop(now + 0.3);
  },

  // 拾起碎片音效
  playPickup() {
    if (!this.soundOn) return;
    this.ensureCtx();
    const ctx = this.ctx;
    const now = ctx.currentTime;
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(520, now);
    osc.frequency.exponentialRampToValueAtTime(780, now + 0.15);
    gain.gain.setValueAtTime(0.08, now);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
    osc.connect(gain).connect(this.masterGain);
    osc.start(now);
    osc.stop(now + 0.2);
  },

  // 完成音效 - 悦耳的和弦
  playComplete() {
    if (!this.soundOn) return;
    this.ensureCtx();
    const ctx = this.ctx;
    const now = ctx.currentTime;
    const notes = [523, 659, 784, 1047]; // C5 E5 G5 C6
    notes.forEach((freq, i) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'sine';
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(0, now + i * 0.15);
      gain.gain.linearRampToValueAtTime(0.12, now + i * 0.15 + 0.05);
      gain.gain.exponentialRampToValueAtTime(0.001, now + i * 0.15 + 1.2);
      osc.connect(gain).connect(this.masterGain);
      osc.start(now + i * 0.15);
      osc.stop(now + i * 0.15 + 1.2);
    });
  },

  // 背景音乐 - 舒缓的 ambient 和弦循环
  startMusic() {
    if (this.musicPlaying) return;
    this.ensureCtx();
    this.musicPlaying = true;

    const ctx = this.ctx;
    const master = ctx.createGain();
    master.gain.value = 0.08;
    master.connect(this.masterGain);

    // 柔和的和弦进行
    const chords = [
      [261.6, 329.6, 392.0],  // C
      [220.0, 277.2, 329.6],  // Am
      [246.9, 311.1, 370.0],  // B-
      [196.0, 246.9, 293.7],  // G
    ];

    let chordIndex = 0;

    const playChord = () => {
      if (!this.musicOn) { this.musicPlaying = false; return; }
      const chord = chords[chordIndex % chords.length];
      chordIndex++;
      const now = ctx.currentTime;

      chord.forEach(freq => {
        const osc = ctx.createOscillator();
        const g = ctx.createGain();
        osc.type = 'sine';
        osc.frequency.value = freq;
        // 添加轻微颤音
        const vibrato = ctx.createOscillator();
        const vibratoGain = ctx.createGain();
        vibrato.frequency.value = 4;
        vibratoGain.gain.value = 2;
        vibrato.connect(vibratoGain).connect(osc.frequency);
        vibrato.start(now);

        g.gain.setValueAtTime(0, now);
        g.gain.linearRampToValueAtTime(0.3, now + 0.8);
        g.gain.linearRampToValueAtTime(0.2, now + 2);
        g.gain.linearRampToValueAtTime(0, now + 3.5);
        osc.connect(g).connect(master);
        osc.start(now);
        osc.stop(now + 4);
        vibrato.stop(now + 4);
      });

      this._musicTimer = setTimeout(playChord, 3200);
    };

    playChord();
  },

  stopMusic() {
    this.musicOn = false;
    this.musicPlaying = false;
    if (this._musicTimer) clearTimeout(this._musicTimer);
  },

  setVolume(v) {
    this.volume = v;
    if (this.masterGain) this.masterGain.gain.value = v;
  }
};

// ========== 图片生成 ==========
const Themes = {
  cherry: (ctx, w, h) => {
    // 樱花渐变背景
    const bg = ctx.createLinearGradient(0, 0, w, h);
    bg.addColorStop(0, '#fce4ec');
    bg.addColorStop(0.5, '#f8bbd0');
    bg.addColorStop(1, '#e8f5e9');
    ctx.fillStyle = bg;
    ctx.fillRect(0, 0, w, h);

    // 樱花树
    ctx.save();
    // 树干
    ctx.strokeStyle = '#8d6e63';
    ctx.lineWidth = 6;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(w * 0.5, h * 0.85);
    ctx.lineTo(w * 0.5, h * 0.55);
    ctx.stroke();
    // 树枝
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(w * 0.5, h * 0.6);
    ctx.lineTo(w * 0.35, h * 0.45);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(w * 0.5, h * 0.6);
    ctx.lineTo(w * 0.65, h * 0.4);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(w * 0.5, h * 0.58);
    ctx.lineTo(w * 0.48, h * 0.35);
    ctx.stroke();

    // 樱花花朵
    const drawFlower = (x, y, r) => {
      ctx.save();
      ctx.translate(x, y);
      for (let i = 0; i < 5; i++) {
        ctx.beginPath();
        ctx.ellipse(0, -r * 0.6, r * 0.4, r * 0.7, (Math.PI * 2 / 5) * i, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255, ${180 + Math.random() * 40}, ${200 + Math.random() * 30}, 0.85)`;
        ctx.fill();
      }
      // 花心
      ctx.beginPath();
      ctx.arc(0, 0, r * 0.2, 0, Math.PI * 2);
      ctx.fillStyle = '#fff9c4';
      ctx.fill();
      ctx.restore();
    };

    // 树上和空中散落的樱花
    const flowers = [
      [0.38, 0.42, 8], [0.45, 0.33, 10], [0.52, 0.38, 9],
      [0.62, 0.37, 7], [0.55, 0.5, 6], [0.42, 0.55, 8],
      [0.3, 0.6, 5], [0.68, 0.55, 6], [0.5, 0.28, 7],
      [0.25, 0.3, 6], [0.72, 0.35, 8], [0.58, 0.22, 5],
    ];
    flowers.forEach(([px, py, r]) => drawFlower(w * px, h * py, r));

    // 飘落的花瓣
    ctx.restore();
    for (let i = 0; i < 25; i++) {
      ctx.save();
      const x = Math.random() * w;
      const y = Math.random() * h;
      const size = 3 + Math.random() * 5;
      ctx.translate(x, y);
      ctx.rotate(Math.random() * Math.PI);
      ctx.beginPath();
      ctx.ellipse(0, 0, size, size * 0.6, 0, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255, ${180 + Math.random() * 50}, ${200 + Math.random() * 30}, ${0.4 + Math.random() * 0.4})`;
      ctx.fill();
      ctx.restore();
    }

    // 草地
    const grassGrad = ctx.createLinearGradient(0, h * 0.82, 0, h);
    grassGrad.addColorStop(0, '#c8e6c9');
    grassGrad.addColorStop(1, '#a5d6a7');
    ctx.fillStyle = grassGrad;
    ctx.fillRect(0, h * 0.82, w, h * 0.18);

    // 落花草地
    for (let i = 0; i < 15; i++) {
      ctx.beginPath();
      ctx.ellipse(
        Math.random() * w, h * 0.84 + Math.random() * h * 0.14,
        4 + Math.random() * 4, 3 + Math.random() * 3,
        Math.random() * Math.PI, 0, Math.PI * 2
      );
      ctx.fillStyle = `rgba(255, 180, 200, ${0.3 + Math.random() * 0.3})`;
      ctx.fill();
    }
  },

  ocean: (ctx, w, h) => {
    // 海洋渐变
    const skyGrad = ctx.createLinearGradient(0, 0, 0, h * 0.5);
    skyGrad.addColorStop(0, '#b3e5fc');
    skyGrad.addColorStop(1, '#e1f5fe');
    ctx.fillStyle = skyGrad;
    ctx.fillRect(0, 0, w, h * 0.5);

    // 太阳
    const sunGrad = ctx.createRadialGradient(w * 0.75, h * 0.2, 5, w * 0.75, h * 0.2, 40);
    sunGrad.addColorStop(0, '#fff9c4');
    sunGrad.addColorStop(0.5, '#fff176');
    sunGrad.addColorStop(1, 'rgba(255,241,118,0)');
    ctx.fillStyle = sunGrad;
    ctx.fillRect(w * 0.55, h * 0.05, w * 0.4, w * 0.4);

    // 云
    const drawCloud = (x, y, scale) => {
      ctx.save();
      ctx.translate(x, y);
      ctx.scale(scale, scale);
      ctx.fillStyle = 'rgba(255,255,255,0.8)';
      ctx.beginPath();
      ctx.arc(0, 0, 15, 0, Math.PI * 2);
      ctx.arc(15, -5, 18, 0, Math.PI * 2);
      ctx.arc(32, 0, 14, 0, Math.PI * 2);
      ctx.arc(15, 8, 12, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    };
    drawCloud(w * 0.2, h * 0.15, 1);
    drawCloud(w * 0.6, h * 0.1, 0.7);
    drawCloud(w * 0.85, h * 0.22, 0.5);

    // 海面
    const seaGrad = ctx.createLinearGradient(0, h * 0.5, 0, h);
    seaGrad.addColorStop(0, '#4fc3f7');
    seaGrad.addColorStop(0.4, '#29b6f6');
    seaGrad.addColorStop(1, '#0288d1');
    ctx.fillStyle = seaGrad;
    ctx.fillRect(0, h * 0.5, w, h * 0.5);

    // 波浪
    for (let wave = 0; wave < 4; wave++) {
      ctx.beginPath();
      ctx.moveTo(0, h * 0.5 + wave * 20);
      for (let x = 0; x <= w; x += 5) {
        const y = h * 0.5 + wave * 20 + Math.sin((x + wave * 30) * 0.03) * (6 - wave);
        ctx.lineTo(x, y);
      }
      ctx.strokeStyle = `rgba(255,255,255,${0.15 - wave * 0.03})`;
      ctx.lineWidth = 1.5;
      ctx.stroke();
    }

    // 海面反光
    for (let i = 0; i < 20; i++) {
      ctx.beginPath();
      const x = Math.random() * w;
      const y = h * 0.52 + Math.random() * h * 0.4;
      ctx.moveTo(x, y);
      ctx.lineTo(x + 10 + Math.random() * 15, y);
      ctx.strokeStyle = `rgba(255,255,255,${0.2 + Math.random() * 0.3})`;
      ctx.lineWidth = 1;
      ctx.stroke();
    }

    // 远处小岛
    ctx.beginPath();
    ctx.ellipse(w * 0.15, h * 0.5, 35, 12, 0, 0, Math.PI * 2);
    ctx.fillStyle = '#66bb6a';
    ctx.fill();
    // 岛上山
    ctx.beginPath();
    ctx.moveTo(w * 0.15 - 20, h * 0.5);
    ctx.lineTo(w * 0.15, h * 0.38);
    ctx.lineTo(w * 0.15 + 20, h * 0.5);
    ctx.fillStyle = '#81c784';
    ctx.fill();
  },

  forest: (ctx, w, h) => {
    // 森林背景
    const bg = ctx.createLinearGradient(0, 0, 0, h);
    bg.addColorStop(0, '#e8f5e9');
    bg.addColorStop(0.4, '#c8e6c9');
    bg.addColorStop(1, '#a5d6a7');
    ctx.fillStyle = bg;
    ctx.fillRect(0, 0, w, h);

    // 树干
    const drawTree = (x, y, hTrunk, wTrunk, size) => {
      ctx.fillStyle = '#6d4c41';
      ctx.fillRect(x - wTrunk / 2, y - hTrunk, wTrunk, hTrunk);
      // 树冠
      ctx.beginPath();
      ctx.moveTo(x - size, y - hTrunk);
      ctx.lineTo(x + size, y - hTrunk);
      ctx.lineTo(x, y - hTrunk - size * 1.2);
      ctx.closePath();
      ctx.fillStyle = `hsl(${120 + Math.random() * 20}, 40%, ${35 + Math.random() * 15}%)`;
      ctx.fill();
      // 第二层
      ctx.beginPath();
      ctx.moveTo(x - size * 0.8, y - hTrunk - size * 0.4);
      ctx.lineTo(x + size * 0.8, y - hTrunk - size * 0.4);
      ctx.lineTo(x, y - hTrunk - size * 1.8);
      ctx.closePath();
      ctx.fillStyle = `hsl(${120 + Math.random() * 15}, 45%, ${40 + Math.random() * 10}%)`;
      ctx.fill();
    };

    drawTree(w * 0.3, h * 0.75, 30, 6, 35);
    drawTree(w * 0.7, h * 0.7, 35, 7, 40);
    drawTree(w * 0.1, h * 0.8, 25, 5, 28);
    drawTree(w * 0.85, h * 0.78, 28, 5, 30);
    drawTree(w * 0.5, h * 0.72, 32, 6, 38);

    // 小径
    ctx.beginPath();
    ctx.moveTo(w * 0.4, h);
    ctx.quadraticCurveTo(w * 0.45, h * 0.6, w * 0.55, 0);
    ctx.lineTo(w * 0.6, 0);
    ctx.quadraticCurveTo(w * 0.5, h * 0.6, w * 0.6, h);
    ctx.closePath();
    ctx.fillStyle = '#d7ccc8';
    ctx.fill();

    // 阳光透过树叶
    for (let i = 0; i < 8; i++) {
      const x = Math.random() * w;
      const y = Math.random() * h * 0.6;
      const grad = ctx.createRadialGradient(x, y, 2, x, y, 30 + Math.random() * 20);
      grad.addColorStop(0, 'rgba(255,255,200,0.3)');
      grad.addColorStop(1, 'rgba(255,255,200,0)');
      ctx.fillStyle = grad;
      ctx.fillRect(x - 50, y - 50, 100, 100);
    }

    // 小草
    for (let i = 0; i < 40; i++) {
      ctx.beginPath();
      const x = Math.random() * w;
      const y = h * 0.75 + Math.random() * h * 0.25;
      ctx.moveTo(x, y);
      ctx.quadraticCurveTo(x + (Math.random() - 0.5) * 8, y - 8 - Math.random() * 6, x + (Math.random() - 0.5) * 4, y - 12 - Math.random() * 8);
      ctx.strokeStyle = `hsl(120, 50%, ${45 + Math.random() * 20}%)`;
      ctx.lineWidth = 1;
      ctx.stroke();
    }

    // 小蘑菇
    const drawMushroom = (x, y) => {
      ctx.beginPath();
      ctx.ellipse(x, y, 6, 3, 0, 0, Math.PI * 2);
      ctx.fillStyle = '#d7ccc8';
      ctx.fill();
      ctx.beginPath();
      ctx.arc(x, y - 3, 6, Math.PI, Math.PI * 2);
      ctx.fillStyle = '#ef5350';
      ctx.fill();
      // 白点
      ctx.fillStyle = 'white';
      ctx.beginPath(); ctx.arc(x - 2, y - 5, 1.5, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(x + 2, y - 4, 1, 0, Math.PI * 2); ctx.fill();
    };
    drawMushroom(w * 0.25, h * 0.88);
    drawMushroom(w * 0.72, h * 0.9);
  },

  starry: (ctx, w, h) => {
    // 夜空
    const bg = ctx.createLinearGradient(0, 0, 0, h);
    bg.addColorStop(0, '#0d1b2a');
    bg.addColorStop(0.6, '#1b2838');
    bg.addColorStop(1, '#2e3a59');
    ctx.fillStyle = bg;
    ctx.fillRect(0, 0, w, h);

    // 星星
    for (let i = 0; i < 60; i++) {
      const x = Math.random() * w;
      const y = Math.random() * h * 0.7;
      const r = 0.5 + Math.random() * 1.5;
      const alpha = 0.5 + Math.random() * 0.5;
      ctx.beginPath();
      ctx.arc(x, y, r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255, 255, 240, ${alpha})`;
      ctx.fill();
      // 十字光芒
      if (Math.random() > 0.7) {
        ctx.strokeStyle = `rgba(255, 255, 240, ${alpha * 0.5})`;
        ctx.lineWidth = 0.5;
        ctx.beginPath();
        ctx.moveTo(x - r * 3, y); ctx.lineTo(x + r * 3, y);
        ctx.moveTo(x, y - r * 3); ctx.lineTo(x, y + r * 3);
        ctx.stroke();
      }
    }

    // 月亮
    ctx.save();
    ctx.translate(w * 0.75, h * 0.18);
    const moonGrad = ctx.createRadialGradient(-5, -5, 2, 0, 0, 25);
    moonGrad.addColorStop(0, '#fff9c4');
    moonGrad.addColorStop(1, '#fdd835');
    ctx.fillStyle = moonGrad;
    ctx.beginPath();
    ctx.arc(0, 0, 22, 0, Math.PI * 2);
    ctx.fill();
    // 月亮阴影
    ctx.fillStyle = 'rgba(13, 27, 42, 0.15)';
    ctx.beginPath();
    ctx.arc(5, -3, 18, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();

    // 月亮光晕
    const glow = ctx.createRadialGradient(w * 0.75, h * 0.18, 20, w * 0.75, h * 0.18, 70);
    glow.addColorStop(0, 'rgba(253, 216, 53, 0.1)');
    glow.addColorStop(1, 'rgba(253, 216, 53, 0)');
    ctx.fillStyle = glow;
    ctx.fillRect(w * 0.75 - 70, h * 0.18 - 70, 140, 140);

    // 远山
    ctx.beginPath();
    ctx.moveTo(0, h * 0.65);
    for (let x = 0; x <= w; x += 10) {
      const y = h * 0.65 - Math.sin(x * 0.02) * 25 - Math.sin(x * 0.05) * 10;
      ctx.lineTo(x, y);
    }
    ctx.lineTo(w, h * 0.75);
    ctx.lineTo(0, h * 0.75);
    ctx.closePath();
    ctx.fillStyle = '#1a2a3a';
    ctx.fill();

    // 近山
    ctx.beginPath();
    ctx.moveTo(0, h * 0.75);
    for (let x = 0; x <= w; x += 10) {
      const y = h * 0.75 - Math.sin(x * 0.015 + 1) * 15 - Math.sin(x * 0.04) * 8;
      ctx.lineTo(x, y);
    }
    ctx.lineTo(w, h);
    ctx.lineTo(0, h);
    ctx.closePath();
    ctx.fillStyle = '#15202b';
    ctx.fill();

    // 水面倒影
    const reflGrad = ctx.createLinearGradient(0, h * 0.82, 0, h);
    reflGrad.addColorStop(0, '#1b2838');
    reflGrad.addColorStop(1, '#0d1b2a');
    ctx.fillStyle = reflGrad;
    ctx.fillRect(0, h * 0.82, w, h * 0.18);

    // 水面月光倒影
    ctx.save();
    ctx.globalAlpha = 0.15;
    const reflGrad2 = ctx.createLinearGradient(w * 0.75 - 30, h * 0.82, w * 0.75 + 30, h);
    reflGrad2.addColorStop(0, '#fdd835');
    reflGrad2.addColorStop(1, 'transparent');
    ctx.fillStyle = reflGrad2;
    ctx.fillRect(w * 0.75 - 30, h * 0.82, 60, h * 0.18);
    ctx.restore();
  }
};

// ========== 游戏核心 ==========
const Game = {
  gridSize: 4,
  pieces: [],
  placed: [],
  selected: null,
  canvas: null,
  ctx: null,
  previewCanvas: null,
  previewCtx: null,
  pieceSize: 0,
  imgCanvas: null,
  imgW: 0,
  imgH: 0,
  timerInterval: null,
  startTime: null,
  moves: 0,
  currentTheme: 'cherry',
  dragging: false,
  dragPiece: null,
  dragX: 0,
  dragY: 0,
  offsetX: 0,
  offsetY: 0,
  completed: false,
  previewTimeout: null,

  init() {
    this.canvas = document.getElementById('puzzle-canvas');
    this.ctx = this.canvas.getContext('2d');
    this.previewCanvas = document.getElementById('preview-canvas');
    this.previewCtx = this.previewCanvas.getContext('2d');
    this.setGridSize(4);
    this.generateImage();
    this.shuffle();
    this.startTimer();
    this.render();
  },

  setGridSize(size) {
    this.gridSize = size;
    const maxW = Math.min(500, window.innerWidth - 260);
    this.imgW = Math.min(maxW, 500);
    this.imgH = this.imgW;
    this.pieceSize = this.imgW / size;
    this.canvas.width = this.imgW;
    this.canvas.height = this.imgH;
    document.getElementById('pieces-total').textContent = size * size;
  },

  generateImage() {
    const offscreen = document.createElement('canvas');
    offscreen.width = this.imgW;
    offscreen.height = this.imgH;
    const ctx = offscreen.getContext('2d');
    Themes[this.currentTheme](ctx, this.imgW, this.imgH);
    this.imgCanvas = offscreen;  // 保存 canvas 元素
    this.previewCtx.clearRect(0, 0, 180, 180);
    this.previewCtx.drawImage(offscreen, 0, 0, 180, 180);
  },

  shuffle() {
    const size = this.gridSize;
    const total = size * size;
    this.pieces = [];

    for (let i = 0; i < total; i++) {
      this.pieces.push({
        id: i,
        targetRow: Math.floor(i / size),
        targetCol: i % size,
        currentRow: Math.floor(i / size),
        currentCol: i % size,
        placed: true,
      });
    }

    // 打乱 - 交换随机位置
    for (let iter = 0; iter < size * size * 3; iter++) {
      const a = Math.floor(Math.random() * total);
      const b = Math.floor(Math.random() * total);
      // 交换位置
      const tmpR = this.pieces[a].currentRow, tmpC = this.pieces[a].currentCol;
      this.pieces[a].currentRow = this.pieces[b].currentRow;
      this.pieces[a].currentCol = this.pieces[b].currentCol;
      this.pieces[b].currentRow = tmpR;
      this.pieces[b].currentCol = tmpC;
    }

    // 标记为未放置（放到画布上的随机位置）
    this.pieces.forEach(p => {
      p.placed = false;
      p.x = Math.random() * (this.imgW - this.pieceSize);
      p.y = Math.random() * (this.imgH - this.pieceSize);
    });

    this.placed = new Array(total).fill(false);
    this.moves = 0;
    this.completed = false;
    document.getElementById('moves').textContent = '0';
    document.getElementById('pieces-done').textContent = '0';
    this.startTimer();
    this.render();
  },

  startTimer() {
    if (this.timerInterval) clearInterval(this.timerInterval);
    this.startTime = Date.now();
    this.timerInterval = setInterval(() => {
      const elapsed = Date.now() - this.startTime;
      const min = String(Math.floor(elapsed / 60000)).padStart(2, '0');
      const sec = String(Math.floor((elapsed % 60000) / 1000)).padStart(2, '0');
      document.getElementById('timer').textContent = `${min}:${sec}`;
    }, 1000);
  },

  render() {
    const ctx = this.ctx;
    const size = this.pieceSize;

    // 清空画布
    ctx.fillStyle = '#f7fafc';
    ctx.fillRect(0, 0, this.imgW, this.imgH);

    // 绘制网格线
    ctx.strokeStyle = 'rgba(124, 158, 178, 0.15)';
    ctx.lineWidth = 1;
    for (let i = 0; i <= this.gridSize; i++) {
      ctx.beginPath();
      ctx.moveTo(i * size, 0); ctx.lineTo(i * size, this.imgH);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(0, i * size); ctx.lineTo(this.imgW, i * size);
      ctx.stroke();
    }

    // 绘制已放置的碎片
    this.pieces.forEach(p => {
      if (p.placed) {
        ctx.drawImage(
          this.imgCanvas,
          p.targetCol * size, p.targetRow * size, size, size,
          p.targetCol * size, p.targetRow * size, size, size
        );
        // 柔和边框
        ctx.strokeStyle = 'rgba(255,255,255,0.6)';
        ctx.lineWidth = 1.5;
        ctx.strokeRect(p.targetCol * size, p.targetRow * size, size, size);
      }
    });

    // 绘制未放置的碎片
    this.pieces.forEach(p => {
      if (!p.placed) {
        // 阴影
        ctx.save();
        ctx.shadowColor = 'rgba(124, 158, 178, 0.25)';
        ctx.shadowBlur = 8;
        ctx.shadowOffsetX = 2;
        ctx.shadowOffsetY = 2;
        ctx.drawImage(
          this.imgCanvas,
          p.targetCol * size, p.targetRow * size, size, size,
          p.x, p.y, size, size
        );
        ctx.restore();
        // 边框
        ctx.strokeStyle = 'rgba(124, 158, 178, 0.4)';
        ctx.lineWidth = 1.5;
        ctx.strokeRect(p.x, p.y, size, size);
        // 圆角效果
        ctx.strokeStyle = 'rgba(255,255,255,0.7)';
        ctx.lineWidth = 1;
        this.roundRect(ctx, p.x, p.y, size, size, 3);
      }
    });

    // 绘制选中的碎片高亮
    if (this.selected !== null) {
      const p = this.pieces[this.selected];
      if (!p.placed) {
        ctx.strokeStyle = 'rgba(124, 158, 178, 0.8)';
        ctx.lineWidth = 2.5;
        ctx.setLineDash([4, 4]);
        ctx.strokeRect(p.x, p.y, size, size);
        ctx.setLineDash([]);
      }
    }

    // 检查完成
    this.checkComplete();
  },

  roundRect(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
    ctx.stroke();
  },

  getPieceAt(x, y) {
    for (let i = this.pieces.length - 1; i >= 0; i--) {
      const p = this.pieces[i];
      if (!p.placed && x >= p.x && x <= p.x + this.pieceSize && y >= p.y && y <= p.y + this.pieceSize) {
        return i;
      }
    }
    return null;
  },

  getGridAt(x, y) {
    const col = Math.floor(x / this.pieceSize);
    const row = Math.floor(y / this.pieceSize);
    if (col >= 0 && col < this.gridSize && row >= 0 && row < this.gridSize) {
      return { row, col };
    }
    return null;
  },

  snapPiece(pieceIdx) {
    const p = this.pieces[pieceIdx];
    const grid = this.getGridAt(p.x + this.pieceSize / 2, p.y + this.pieceSize / 2);
    if (grid && !this.placed[grid.row * this.gridSize + grid.col]) {
      // 检查是否是正确的位置
      if (grid.row === p.targetRow && grid.col === p.targetCol) {
        p.placed = true;
        this.placed[grid.row * this.gridSize + grid.col] = true;
        this.moves++;
        document.getElementById('moves').textContent = this.moves;
        const done = this.placed.filter(Boolean).length;
        document.getElementById('pieces-done').textContent = done;
        AudioSystem.playSnap();
        this.render();
        return true;
      }
    }
    return false;
  },

  checkComplete() {
    if (this.completed) return;
    const done = this.placed.filter(Boolean).length;
    if (done === this.gridSize * this.gridSize) {
      this.completed = true;
      clearInterval(this.timerInterval);
      AudioSystem.playComplete();
      const elapsed = Date.now() - this.startTime;
      const min = String(Math.floor(elapsed / 60000)).padStart(2, '0');
      const sec = String(Math.floor((elapsed % 60000) / 1000)).padStart(2, '0');
      document.getElementById('modal-msg').innerHTML =
        `你用了 <strong>${this.moves}</strong> 次移动，耗时 <strong>${min}:${sec}</strong>`;
      setTimeout(() => {
        document.getElementById('modal').classList.add('show');
      }, 500);
    }
  },

  // 触摸/鼠标事件
  setupEvents() {
    const canvas = this.canvas;

    const getPos = (e) => {
      const rect = canvas.getBoundingClientRect();
      const clientX = e.touches ? e.touches[0].clientX : e.clientX;
      const clientY = e.touches ? e.touches[0].clientY : e.clientY;
      return {
        x: (clientX - rect.left) * (canvas.width / rect.width),
        y: (clientY - rect.top) * (canvas.height / rect.height)
      };
    };

    const onDown = (e) => {
      e.preventDefault();
      AudioSystem.ensureCtx();
      const pos = getPos(e);
      const pieceIdx = this.getPieceAt(pos.x, pos.y);
      if (pieceIdx !== null) {
        this.dragging = true;
        this.dragPiece = pieceIdx;
        this.selected = pieceIdx;
        const p = this.pieces[pieceIdx];
        this.offsetX = pos.x - p.x;
        this.offsetY = pos.y - p.y;
        AudioSystem.playPickup();
        this.render();
      }
    };

    const onMove = (e) => {
      e.preventDefault();
      if (!this.dragging) return;
      const pos = getPos(e);
      const p = this.pieces[this.dragPiece];
      p.x = pos.x - this.offsetX;
      p.y = pos.y - this.offsetY;
      this.render();
    };

    const onUp = (e) => {
      if (!this.dragging) return;
      const snapped = this.snapPiece(this.dragPiece);
      if (!snapped) {
        // 松手后碎片回到上一次位置（或者可以添加弹性动画）
      }
      this.dragging = false;
      this.dragPiece = null;
      this.selected = null;
      this.render();
    };

    canvas.addEventListener('mousedown', onDown);
    canvas.addEventListener('mousemove', onMove);
    canvas.addEventListener('mouseup', onUp);
    canvas.addEventListener('mouseleave', onUp);
    canvas.addEventListener('touchstart', onDown, { passive: false });
    canvas.addEventListener('touchmove', onMove, { passive: false });
    canvas.addEventListener('touchend', onUp);
  }
};

// ========== UI 控制 ==========
function closeModal() {
  document.getElementById('modal').classList.remove('show');
  Game.shuffle();
}

function changeTheme(theme) {
  Game.currentTheme = theme;
  Game.generateImage();
  Game.shuffle();
  AudioSystem.playPickup();
}

function changeDifficulty(size) {
  Game.setGridSize(parseInt(size));
  Game.generateImage();
  Game.shuffle();
}

// 预览闪烁
function showOriginal() {
  const canvas = Game.canvas;
  const ctx = Game.ctx;
  const imgCanvas = Game.imgCanvas;

  // 短暂显示原图
  ctx.drawImage(imgCanvas, 0, 0);
  // 网格线
  const size = Game.pieceSize;
  ctx.strokeStyle = 'rgba(255,255,255,0.4)';
  ctx.lineWidth = 1;
  for (let i = 0; i <= Game.gridSize; i++) {
    ctx.beginPath();
    ctx.moveTo(i * size, 0); ctx.lineTo(i * size, Game.imgH);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(0, i * size); ctx.lineTo(Game.imgW, i * size);
    ctx.stroke();
  }

  if (Game.previewTimeout) clearTimeout(Game.previewTimeout);
  Game.previewTimeout = setTimeout(() => Game.render(), 1200);
}

// ========== 初始化 ==========
window.addEventListener('DOMContentLoaded', () => {
  // 花瓣动画
  const petalsContainer = document.getElementById('petals');
  for (let i = 0; i < 18; i++) {
    const petal = document.createElement('div');
    petal.className = 'petal';
    petal.style.left = Math.random() * 100 + '%';
    petal.style.animationDuration = (6 + Math.random() * 8) + 's';
    petal.style.animationDelay = (Math.random() * 10) + 's';
    petal.style.width = (8 + Math.random() * 8) + 'px';
    petal.style.height = (8 + Math.random() * 8) + 'px';
    petal.style.opacity = 0.3 + Math.random() * 0.4;
    petalsContainer.appendChild(petal);
  }

  // 初始化游戏
  Game.init();
  Game.setupEvents();

  // 按钮事件
  document.getElementById('btn-shuffle').addEventListener('click', () => {
    Game.shuffle();
    AudioSystem.playPickup();
  });

  document.getElementById('btn-show-original').addEventListener('click', showOriginal);

  // 音效开关
  document.getElementById('btn-sound').addEventListener('click', function() {
    AudioSystem.soundOn = !AudioSystem.soundOn;
    this.textContent = AudioSystem.soundOn ? '🔊' : '🔇';
  });

  // 音乐开关
  document.getElementById('btn-music').addEventListener('click', function() {
    AudioSystem.musicOn = !AudioSystem.musicOn;
    this.textContent = AudioSystem.musicOn ? '🎵' : '🎵';
    if (AudioSystem.musicOn) {
      AudioSystem.musicOn = true;
      AudioSystem.startMusic();
    } else {
      AudioSystem.stopMusic();
    }
  });

  // 难度按钮
  document.querySelectorAll('.diff-btn').forEach(btn => {
    btn.addEventListener('click', function() {
      document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
      this.classList.add('active');
      changeDifficulty(this.dataset.size);
    });
  });

  // 主题按钮
  document.querySelectorAll('.theme-btn').forEach(btn => {
    btn.addEventListener('click', function() {
      document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('active'));
      this.classList.add('active');
      changeTheme(this.dataset.theme);
    });
  });

  // 音量滑块
  document.getElementById('volume-slider').addEventListener('input', function() {
    const v = this.value / 100;
    AudioSystem.setVolume(v);
    document.getElementById('vol-label').textContent = v === 0 ? '🔇' : v < 0.5 ? '🔉' : '🔊';
  });

  // 首次交互后启动音乐
  const startAudio = () => {
    AudioSystem.ensureCtx();
    if (AudioSystem.musicOn) AudioSystem.startMusic();
    document.removeEventListener('click', startAudio);
    document.removeEventListener('touchstart', startAudio);
  };
  document.addEventListener('click', startAudio);
  document.addEventListener('touchstart', startAudio);
});
</script>
</body>
</html>
