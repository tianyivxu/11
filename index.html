<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>七巧 · Tangram</title>
<style>
  :root{
    --paper:#f3ead3; --paper2:#efe2c2; --ink:#3a2f23; --ink2:#6b5a44;
    --line:#cdb98e; --accent:#c8612a; --ok:#5b9a3e; --shadow:rgba(58,47,35,.18);
    --p-st:#e8833a; --p-mt:#3a9fe8; --p-lt:#e84a4a; --p-sq:#5bc36a; --p-pg:#c06ae8;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%;overflow:hidden;font-family:"PingFang SC","Microsoft YaHei",system-ui,sans-serif;
    color:var(--ink);user-select:none;-webkit-user-select:none;touch-action:none}
  body{background:
    radial-gradient(120% 90% at 10% 0%,rgba(255,255,255,.5),transparent 50%),
    radial-gradient(120% 90% at 90% 100%,rgba(120,90,40,.12),transparent 55%),
    linear-gradient(135deg,var(--paper),var(--paper2));
    background-attachment:fixed}
  /* paper grain */
  body::before{content:"";position:fixed;inset:0;pointer-events:none;opacity:.5;mix-blend-mode:multiply;
    background-image:radial-gradient(rgba(120,90,40,.10) 1px,transparent 1px);
    background-size:3px 3px}

  #app{display:flex;flex-direction:column;height:100%}
  header{display:flex;align-items:center;gap:10px;padding:8px 14px;
    background:rgba(243,234,211,.7);backdrop-filter:blur(4px);border-bottom:1px solid var(--line);z-index:5}
  .ttl{font-weight:800;letter-spacing:2px;font-size:18px;white-space:nowrap}
  .ttl b{color:var(--accent)}
  .hud{display:flex;align-items:center;gap:6px;font-size:13px;white-space:nowrap}
  .pill{background:rgba(255,255,255,.55);border:1px solid var(--line);border-radius:20px;padding:3px 10px;font-variant-numeric:tabular-nums}
  .stars{color:var(--accent);letter-spacing:1px}
  .spacer{flex:1}
  button{font-family:inherit;font-size:13px;color:var(--ink);background:rgba(255,255,255,.6);
    border:1px solid var(--line);border-radius:10px;padding:6px 10px;cursor:pointer;transition:.12s}
  button:hover{background:#fff;transform:translateY(-1px)}
  button:active{transform:translateY(0)}
  button.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
  button.primary:hover{background:#b5551f}
  button:disabled{opacity:.4;cursor:not-allowed}
  .icon{font-size:15px}

  main{flex:1;position:relative;overflow:hidden}
  #stage{position:absolute;inset:0;width:100%;height:100%}
  svg{display:block;width:100%;height:100%}

  /* pieces */
  .pc{cursor:grab;transition:filter .12s}
  .pc:hover{filter:brightness(1.05)}
  .pc.dragging{cursor:grabbing}
  .pc.locked{cursor:default}
  .pc.hint{animation:hintpulse 1.2s ease-in-out 3}
  @keyframes hintpulse{0%,100%{filter:none}50%{filter:drop-shadow(0 0 10px #ffd24a) brightness(1.15)}}

  /* overlay panels */
  .panel{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
    background:rgba(248,240,222,.97);border:1px solid var(--line);border-radius:16px;
    box-shadow:0 14px 40px var(--shadow);padding:26px 32px;text-align:center;min-width:300px;z-index:20}
  .panel h2{margin:0 0 6px;font-size:24px}
  .panel p{margin:0 0 16px;color:var(--ink2);font-size:14px}
  .panel .row{display:flex;gap:10px;justify-content:center}
  .bigstars{font-size:40px;letter-spacing:6px;color:var(--accent);margin:10px 0 6px}

  .toast{position:absolute;left:50%;bottom:74px;transform:translateX(-50%);
    background:rgba(58,47,35,.88);color:#fff;padding:7px 16px;border-radius:20px;font-size:13px;
    opacity:0;transition:.3s;pointer-events:none;z-index:15}
  .toast.show{opacity:1}

  .lvlbar{position:absolute;left:50%;bottom:16px;transform:translateX(-50%);
    display:flex;gap:6px;max-width:90vw;overflow-x:auto;padding:6px;background:rgba(248,240,222,.6);
    border:1px solid var(--line);border-radius:12px;z-index:6}
  .lvlbar button{padding:4px 8px;font-size:12px;min-width:34px;border-radius:8px}
  .lvlbar button.cur{background:var(--accent);color:#fff;border-color:var(--accent)}
  .lvlbar button.done{color:var(--ok);font-weight:700}

  .help{position:absolute;right:12px;top:60px;font-size:11px;color:var(--ink2);background:rgba(248,240,222,.7);
    border:1px solid var(--line);border-radius:10px;padding:8px 10px;line-height:1.6;z-index:6;max-width:170px}
  .help b{color:var(--accent)}
  @media(max-width:560px){.help{display:none}.ttl{font-size:15px}.hud{font-size:12px}}
  .hint-mini{position:absolute;bottom:6px;left:8px;font-size:11px;color:var(--ink2);z-index:6}
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="ttl">七<b>巧</b></div>
    <div class="hud"><span class="pill">第 <b id="lvNum">1</b> 关</span></div>
    <div class="hud"><span class="pill">⏱ <b id="timer">0:00</b></span></div>
    <div class="hud"><span class="pill">💡 <b id="hintLeft">2</b></span></div>
    <div class="hud"><span class="pill stars" id="starView">★★★</span></div>
    <div class="spacer"></div>
    <button id="btnHint" title="提示(每关2次)">💡 提示</button>
    <button id="btnReset" title="重玩本关">↺ 重置</button>
    <button id="btnPrev">‹</button>
    <button id="btnNext">›</button>
    <button id="btnSound" class="icon" title="静音">🔊</button>
  </header>
  <main>
    <div id="stage"><svg id="svg" viewBox="0 0 1000 700" preserveAspectRatio="xMidYMid meet"></svg></div>
    <div class="help">
      <b>玩法</b><br>
      拖动方块拼入灰色轮廓<br>
      双击 / R键 = 旋转45°<br>
      越快完成星级越高<br>
      💡提示每关2次
    </div>
    <div class="toast" id="toast"></div>
    <div class="lvlbar" id="lvlbar"></div>
  </main>
</div>
<script>
"use strict";
/* ============ 常量与七块定义 ============ */
const S2 = Math.SQRT2, H = Math.SQRT1_2; // √2 与 √2/2
const U = 64;          // 单位像素(小三角直角边)
const SNAP_PX = U*0.32; // 位置吸附容差
const SNAP_DEG = 24;    // 角度容差
// 七块类型: lt大三角x2, mt中三角, st小三角x2, sq正方形, pg平行四边形
const PIECE_DEFS = {
  lt: { verts:[[0,0],[2,0],[0,2]], color:'#e84a4a', sym:90 },        // 等腰直角,无旋转对称(实际0)
  mt: { verts:[[0,0],[S2,0],[0,S2]], color:'#3a9fe8', sym:0 },
  st: { verts:[[0,0],[1,0],[0,1]], color:'#e8833a', sym:0 },
  sq: { verts:[[0,0],[1,0],[1,1],[0,1]], color:'#5bc36a', sym:90 },
  pg: { verts:[[0,0],[S2,0],[S2+H,H],[H,H]], color:'#c06ae8', sym:180 }
};
// 每块的对称角度(可接受旋转步长)
const SYM = { lt:0, mt:0, st:0, sq:90, pg:180 };
// 关卡使用顺序: 类型id; lt与st各有2个,程序区分
const ALL_TYPES = ['lt','lt','mt','st','st','sq','pg'];
// 颜色给同类型不同实例区分
const COLORS = { lt0:'#e84a4a', lt1:'#d8403f', mt:'#3a9fe8', st0:'#e8833a', st1:'#f0a040', sq:'#5bc36a', pg:'#c06ae8' };

/* 状态 */
const S = {
  level:1, total:100, pieces:[], targets:[], time:0, t0:0, running:false,
  hints:2, flipped:new Set(), won:false, sound:true, completed:{}, star:3
};
let svg, timerHandle=null, seedRng=1;
function rng(){ seedRng=(seedRng*1664525+1013904223)%4294967296; return seedRng/4294967296; }
function rint(n){ return Math.floor(rng()*n); }
function pick(a){ return a[rint(a.length)]; }
/* ============ 几何工具 ============ */
function rad(d){return d*Math.PI/180;}
function rotPt(x,y,a){const c=Math.cos(a),s=Math.sin(a);return [x*c-y*s, x*s+y*c];}
// 把局部顶点按 rot度旋转 + 平移 -> 世界坐标
function xform(verts, ox,oy, rot){
  const a=rad(rot), c=Math.cos(a), s=Math.sin(a), out=[];
  for(const [x,y] of verts) out.push([ox+x*c-y*s, oy+x*s+y*c]);
  return out;
}
function polyArea(p){let a=0;for(let i=0,n=p.length;i<n;i++){const j=(i+1)%n;a+=p[i][0]*p[j][1]-p[j][0]*p[i][1];}return Math.abs(a)/2;}
function polyCentroid(p){let A=0,cx=0,cy=0;for(let i=0,n=p.length;i<n;i++){const j=(i+1)%n;const f=p[i][0]*p[j][1]-p[j][0]*p[i][1];A+=f;cx+=(p[i][0]+p[j][0])*f;cy+=(p[i][1]+p[j][1])*f;}A*=0.5;if(Math.abs(A)<1e-9){let x=0,y=0;for(const q of p){x+=q[0];y+=q[1];}return[x/p.length,y/p.length];}return[cx/(6*A),cy/(6*A)];}
function segInt(a,b,c,d){
  const r=0; const d1x=b[0]-a[0],d1y=b[1]-a[1],d2x=d[0]-c[0],d2y=d[1]-c[1];
  const den=d1x*d2y-d1y*d2x; if(Math.abs(den)<1e-9)return null;
  const t=((c[0]-a[0])*d2y-(c[1]-a[1])*d2x)/den;
  const u=((c[0]-a[0])*d1y-(c[1]-a[1])*d1x)/den;
  if(t>1e-6&&t<1-1e-6&&u>1e-6&&u<1-1e-6) return [a[0]+t*d1x, a[1]+t*d1y];
  return null;
}
function ptIn(p,q){let inside=false;for(let i=0,j=p.length-1;i<p.length;j=i++){const xi=p[i][0],yi=p[i][1],xj=p[j][0],yj=p[j][1];if(((yi>q[1])!=(yj>q[1]))&&(q[0]<(xj-xi)*(q[1]-yi)/((yj-yi)||1e-12)+xi))inside=!inside;}return inside;}
// 两个多边形是否显著重叠(允许边贴边/顶点接触). 返回重叠面积近似>tol
function overlap(a,b,tol){
  for(let i=0;i<a.length;i++){const ai=(i+1)%a.length;for(let j=0;j<b.length;j++){const bj=(j+1)%b.length;if(segInt(a[i],a[ai],b[j],b[bj]))return true;}}
  for(const q of a) if(ptIn(b,q)) return true;
  for(const q of b) if(ptIn(a,q)) return true;
  return false;
}
// 边长
function edgeLen(a,b){const dx=b[0]-a[0],dy=b[1]-a[1];return Math.hypot(dx,dy);}
function angleOf(dx,dy){return Math.atan2(dy,dx);}

/* ============ 关卡生成器(边匹配随机拼装) ============ */
// 返回 [{type, inst, ox, oy, rot}] 已是世界坐标
function genLevel(level){
  // 难度: 决定使用块数
  let np;
  if(level<=8) np=[3,4][rint(2)];
  else if(level<=20) np=[4,5][rint(2)];
  else if(level<=40) np=[5,6][rint(2)];
  else np=7;
  for(let attempt=0;attempt<400;attempt++){
    const r=tryAssemble(np, level+attempt*7);
    if(r) return r;
  }
  // 兜底: 退化为简单3块
  return tryAssemble(3, level+999) || fallbackLevel();
}
function fallbackLevel(){ // 简单的2大三角拼正方形
  return [
    {type:'lt',inst:0,ox:0,oy:0,rot:0},
    {type:'lt',inst:1,ox:2,oy:2,rot:180}
  ];
}
// 取一块的世界多边形
function worldOf(def){
  const d=PIECE_DEFS[def.type];
  return xform(d.verts, def.ox, def.oy, def.rot);
}
// 装配
function tryAssemble(np, sd){
  seedRng = (sd*2654435761>>>0) || 1; rng();
  // 选择块: 优先多样的子集
  const chosen = pickSubset(np);
  // 放第一块
  const placed=[];
  const first = chosen[0];
  placed.push({type:first.type, inst:first.inst, ox:0, oy:0, rot: pick([0,45,90,135,180,225,270,315])});
  for(let k=1;k<chosen.length;k++){
    const pc = chosen[k];
    let done=false;
    const tries = 60;
    for(let t=0;t<tries && !done;t++){
      // 随机选一个已放块的边
      const anchor = placed[rint(placed.length)];
      const aw = worldOf(anchor);
      const aEdges=[]; for(let i=0;i<aw.length;i++){const j=(i+1)%aw.length;aEdges.push([i,j,edgeLen(aw[i],aw[j])]);}
      const ae = pick(aEdges);
      // 新块同长边
      const d=PIECE_DEFS[pc.type];
      const bEdges=[]; for(let i=0;i<d.verts.length;i++){const j=(i+1)%d.verts.length;bEdges.push([i,j,edgeLen(d.verts[i],d.verts[j])]);}
      const cands=bEdges.filter(e=>Math.abs(e[2]-ae[2])<1e-3);
      if(cands.length===0) continue;
      const be=pick(cands);
      // 将新块的be边贴合到anchor的ae边的外侧(反向方向)
      const a0=aw[ae[0]], a1=aw[ae[1]];
      const b0=d.verts[be[0]], b1=d.verts[be[1]];
      // 旋转使 b1->b0 方向 == a0->a1 方向 (这样b0落到a1, b1落到a0, 边反向贴合, 互在外侧)
      const angA = angleOf(a1[0]-a0[0], a1[1]-a0[1]);
      const angB = angleOf(b0[0]-b1[0], b0[1]-b1[1]);
      let rot = (angA-angB)*180/Math.PI;
      rot = Math.round(rot/45)*45; // 量化到45度(保证栅格对齐)
      // 世界顶点
      const wb = xform(d.verts, 0,0, rot);
      // 平移使 be 边贴合: wb[be[0]] 应等于 a1, wb[be[1]] 等于 a0
      const ox = a1[0]-wb[be[0]][0], oy = a1[1]-wb[be[0]][1];
      const cand={type:pc.type, inst:pc.inst, ox:ox, oy:oy, rot:((rot%360)+360)%360};
      const cw = worldOf(cand);
      // 重叠检查
      let bad=false;
      for(const p of placed){ if(overlap(worldOf(p), cw, 1e-3)){bad=true;break;} }
      if(bad) continue;
      placed.push(cand); done=true;
    }
    if(!done) return null;
  }
  return placed;
}
// 选子集: 尽量含多样块. 返回 [{type,inst}]
function pickSubset(np){
  const pool = [{type:'lt',inst:0},{type:'lt',inst:1},{type:'mt',inst:0},{type:'st',inst:0},{type:'st',inst:1},{type:'sq',inst:0},{type:'pg',inst:0}];
  // 打乱
  for(let i=pool.length-1;i>0;i--){const j=rint(i+1);[pool[i],pool[j]]=[pool[j],pool[i]];}
  return pool.slice(0, Math.min(np,7));
}
/* ============ 渲染层 ============ */
let VIEW={cx:500,cy:340,sc:64}; // 视图中心与缩放(像素/单位)
function fitView(targets){
  let minx=1e9,miny=1e9,maxx=-1e9,maxy=-1e9;
  const scan=(defs)=>{ for(const t of defs){ const w=worldOf(t); for(const[x,y]of w){minx=Math.min(minx,x);maxx=Math.max(maxx,x);miny=Math.min(miny,y);maxy=Math.max(maxy,y);} } };
  scan(targets); if(S.pieces&&S.pieces.length) scan(S.pieces);
  const w=maxx-minx, h=maxy-miny;
  const pad=80;
  const scx=(1000-pad*2)/Math.max(w,0.1), scy=(620-pad*2)/Math.max(h,0.1);
  VIEW.sc=Math.min(scx,scy,82);
  VIEW.cx=500-((minx+maxx)/2)*VIEW.sc;
  VIEW.cy=330-((miny+maxy)/2)*VIEW.sc;
}
function w2s(x,y){return [VIEW.cx+x*VIEW.sc, VIEW.cy+y*VIEW.sc];}
function s2w(sx,sy){return [(sx-VIEW.cx)/VIEW.sc, (sy-VIEW.cy)/VIEW.sc];}
function polyPts(w){return w.map(p=>{const[sx,sy]=w2s(p[0],p[1]);return sx.toFixed(1)+','+sy.toFixed(1);}).join(' ');}
function instKey(t){ return t.type+(t.type==='lt'?t.inst:(t.type==='st'?t.inst:0)); }

function renderStage(){
  fitView(S.targets);
  const svgEl=document.getElementById('svg');
  // 目标轮廓: 每块填充阴影色 + 描边(同色合并外观, 外边界自动正确, 含凹陷)
  let sil='';
  for(const t of S.targets){
    const w=worldOf(t);
    sil += `<polygon points="${polyPts(w)}" fill="#b9a888" stroke="#8a7858" stroke-width="1.5" stroke-linejoin="round" opacity="0.6"/>`;
  }
  // 玩家块
  let pcs='';
  for(const p of S.pieces){
    const w=worldOf(p);
    const col = COLORS[instKey(p)] || PIECE_DEFS[p.type].color;
    const cls = 'pc'+(p.locked?' locked':'')+(p.hint?' hint':'')+(p.dragging?' dragging':'');
    pcs += `<polygon class="${cls}" data-id="${p.id}" points="${polyPts(w)}" fill="${col}" stroke="#3a2f23" stroke-width="1.5" stroke-linejoin="round" opacity="${p.locked?0.92:1}" filter="${p.locked?'':'url(#sh)'}"/>`;
  }
  svgEl.innerHTML = `
  <defs>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#3a2f23" flood-opacity="0.28"/>
    </filter>
    <pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse"><circle cx="2" cy="2" r="1" fill="#c9b48a" opacity="0.25"/></pattern>
  </defs>
  <rect x="0" y="0" width="1000" height="700" fill="url(#dots)"/>
  <g id="sil">${sil}</g>
  <g id="pcs">${pcs}</g>`;
  bindPieces();
}
// 简化轮廓: 直接用所有目标顶点的凸包不太准确; 改用: 把每个目标块画一次(同色)合并视觉即可.
// 这里 outlineOf 返回所有块合并的外边界近似(凸包), 仅作描边装饰.
function outlineOf(targets){
  const pts=[];
  for(const t of targets){ const w=worldOf(t); for(const p of w) pts.push(p); }
  const ch=convexHull(pts);
  return ch.map(p=>{const[sx,sy]=w2s(p[0],p[1]);return sx.toFixed(1)+','+sy.toFixed(1);}).join(' ');
}
function convexHull(pts){
  pts.sort((a,b)=>a[0]-b[0]||a[1]-b[1]);
  const cross=(o,a,b)=>(a[0]-o[0])*(b[1]-o[1])-(a[1]-o[1])*(b[0]-o[0]);
  const lower=[];
  for(const p of pts){while(lower.length>=2&&cross(lower[lower.length-2],lower[lower.length-1],p)<=0)lower.pop();lower.push(p);}
  const upper=[];
  for(let i=pts.length-1;i>=0;i--){const p=pts[i];while(upper.length>=2&&cross(upper[upper.length-2],upper[upper.length-1],p)<=0)upper.pop();upper.push(p);}
  upper.pop();lower.pop();
  return lower.concat(upper);
}
/* ============ 交互: 拖动 / 双击旋转 / 吸附 ============ */
let drag=null, lastClick={id:null,t:0};
function svgPt(e){
  const svgEl=document.getElementById('svg');
  const pt=svgEl.createSVGPoint(); pt.x=e.clientX; pt.y=e.clientY;
  const m=svgEl.getScreenCTM().inverse();
  const p=pt.matrixTransform(m); return [p.x,p.y];
}
function bindPieces(){
  const els=document.querySelectorAll('.pc');
  for(const el of els){
    el.addEventListener('pointerdown', onDown);
  }
}
function pieceById(id){ return S.pieces.find(p=>p.id===id); }
function onDown(e){
  e.preventDefault();
  const id=e.currentTarget.dataset.id;
  const p=pieceById(id);
  if(!p||p.locked) return;
  startAudio();
  // 双击/双击检测: 同一块 320ms 内再次按下 => 旋转45度(兼容触屏)
  const now=Date.now();
  if(lastClick.id===id && now-lastClick.t<340){
    lastClick={id:null,t:0};
    playSfx('rot');
    rotateAroundCentroid(p, 45);
    updatePieceEl(p);
    trySnap(p);
    return;
  }
  lastClick={id,t:now};
  playSfx('pick');
  const [sx,sy]=svgPt(e);
  const [wx,wy]=s2w(sx,sy);
  drag={id, dx:wx-p.ox, dy:wy-p.oy, moved:false};
  e.currentTarget.setPointerCapture(e.pointerId);
  e.currentTarget.classList.add('dragging');
  p.dragging=true;
  document.addEventListener('pointermove',onMove);
  document.addEventListener('pointerup',onUp);
}
function onMove(e){
  if(!drag) return;
  const p=pieceById(drag.id); if(!p) return;
  const [sx,sy]=svgPt(e);
  const [wx,wy]=s2w(sx,sy);
  p.ox=wx-drag.dx; p.oy=wy-drag.dy;
  drag.moved=true;
  updatePieceEl(p);
}
function onUp(e){
  document.removeEventListener('pointermove',onMove);
  document.removeEventListener('pointerup',onUp);
  if(!drag) return;
  const p=pieceById(drag.id);
  if(p){ p.dragging=false; const el=document.querySelector('.pc[data-id="'+p.id+'"]'); if(el) el.classList.remove('dragging'); }
  drag=null;
  if(p) trySnap(p);
}
function rotateAroundCentroid(p, deg){
  const w=worldOf(p); const c=polyCentroid(w);
  p.rot=(p.rot+deg)%360;
  // 保持质心不动: 调整 ox,oy
  const w2=worldOf(p); const c2=polyCentroid(w2);
  p.ox+=c[0]-c2[0]; p.oy+=c[1]-c2[1];
}
function updatePieceEl(p){
  const el=document.querySelector('.pc[data-id="'+p.id+'"]');
  if(!el){ renderStage(); return; }
  const w=worldOf(p);
  el.setAttribute('points', polyPts(w));
}
// 吸附: 寻找匹配目标(同类型), 质心接近 & 旋转匹配(模对称)
function trySnap(p){
  if(p.locked) return;
  const wc=polyCentroid(worldOf(p));
  let best=null, bestD=SNAP_PX;
  for(let i=0;i<S.targets.length;i++){
    const t=S.targets[i];
    if(t.type!==p.type) continue;
    if(t.satisfied) continue;
    // 同类型多实例可互换: lt/st 两块都可
    const tc=polyCentroid(worldOf(t));
    const d=Math.hypot(wc[0]-tc[0], wc[1]-tc[1]);
    if(d>bestD) continue;
    // 旋转匹配(模对称): 取旋转周期内最近等效角度
    const sym=SYM[p.type]||0;
    const period = sym>0 ? sym : 360;
    let dd = Math.abs(((p.rot-t.rot)%360+360)%360) % period;
    let dist = Math.min(dd, period-dd);
    if(dist>SNAP_DEG) continue;
    best=i; bestD=d;
  }
  if(best!==null){
    const t=S.targets[best];
    p.ox=t.ox; p.oy=t.oy; p.rot=t.rot;
    p.locked=true; t.satisfied=true;
    updatePieceEl(p);
    playSfx('ding');
    checkWin();
  }
}
/* ============ 关卡流程 ============ */
function startLevel(n){
  S.level=Math.max(1,Math.min(S.total,n));
  S.won=false; S.hints=2; S.star=3;
  S.targets = genLevel(S.level);
  for(const t of S.targets) t.satisfied=false;
  // 计算目标bbox, 在其外环散布玩家块
  let minx=1e9,miny=1e9,maxx=-1e9,maxy=-1e9;
  for(const t of S.targets){ const w=worldOf(t); for(const[x,y]of w){minx=Math.min(minx,x);maxx=Math.max(maxx,x);miny=Math.min(miny,y);maxy=Math.max(maxy,y);} }
  const cx=(minx+maxx)/2, cy=(miny+maxy)/2;
  const R = Math.max(2.6, Math.hypot(maxx-minx, maxy-miny)/2 + 1.6);
  S.pieces = S.targets.map((t,i)=>{
    const ang=(i/S.targets.length)*Math.PI*2 - Math.PI/2;
    return {id:'p'+i, type:t.type, inst:t.inst,
      ox:cx+Math.cos(ang)*R, oy:cy+Math.sin(ang)*R,
      rot:pick([0,45,90,135,180,225,270,315]),
      locked:false, hint:false, dragging:false};
  });
  document.getElementById('lvNum').textContent=S.level;
  document.getElementById('hintLeft').textContent=S.hints;
  updateStarView();
  renderStage();
  startTimer();
  hidePanel();
  buildLvlBar();
}
function startTimer(){
  stopTimer(); S.t0=Date.now(); S.time=0; S.running=true;
  timerHandle=setInterval(()=>{
    S.time=(Date.now()-S.t0)/1000;
    document.getElementById('timer').textContent=fmt(S.time);
    updateStarView();
  },250);
}
function stopTimer(){ if(timerHandle){clearInterval(timerHandle);timerHandle=null;} S.running=false; }
function fmt(s){const m=Math.floor(s/60), sec=Math.floor(s%60);return m+':'+String(sec).padStart(2,'0');}
// 星级阈值(秒): 依块数缩放
function starThresholds(np){
  const base={3:[15,30,60],4:[25,50,90],5:[35,70,120],6:[50,100,170],7:[70,140,230]};
  return base[np]||base[7];
}
function calcStars(){
  const np=S.targets.length;
  const th=starThresholds(np);
  if(S.time<=th[0]) return 3; if(S.time<=th[1]) return 2; if(S.time<=th[2]) return 1; return 1;
}
function updateStarView(){
  if(!S.running){ const c=(S.completed[S.level]||{}).star||0; document.getElementById('starView').textContent=starStr(c||S.star); return; }
  const s=calcStars(); S.star=s; document.getElementById('starView').textContent=starStr(s);
}
function starStr(n){ return '★'.repeat(n)+'☆'.repeat(3-n); }
function checkWin(){
  if(S.targets.every(t=>t.satisfied)){
    S.won=true; stopTimer();
    const star=calcStars();
    const prev=(S.completed[S.level]||{}).star||0;
    const best=Math.max(prev,star);
    S.completed[S.level]={star:best, time:S.time};
    updateStarView(); buildLvlBar();
    playSfx('win');
    setTimeout(()=>showWinPanel(star), 350);
    saveProgress();
  }
}
function showWinPanel(star){
  const p=document.createElement('div'); p.className='panel'; p.id='winPanel';
  p.innerHTML=`<h2>完成!</h2><div class="bigstars">${'★'.repeat(star)+'☆'.repeat(3-star)}</div>
    <p>用时 ${fmt(S.time)} · 第 ${S.level} 关</p>
    <div class="row">
      <button id="wpRetry">↺ 再来</button>
      <button class="primary" id="wpNext">下一关 ›</button>
    </div>`;
  document.querySelector('main').appendChild(p);
  document.getElementById('wpRetry').onclick=()=>{startLevel(S.level);};
  document.getElementById('wpNext').onclick=()=>{startLevel(Math.min(S.total,S.level+1));};
}
function hidePanel(){ const p=document.getElementById('winPanel'); if(p) p.remove(); }
function useHint(){
  if(S.hints<=0){ toast('提示已用完'); return; }
  if(S.won) return;
  // 找一个未满足的目标 & 对应玩家块
  let ti=S.targets.findIndex(t=>!t.satisfied);
  if(ti<0) return;
  const t=S.targets[ti];
  const p=S.pieces.find(pp=>!pp.locked && pp.type===t.type && pp.inst===t.inst);
  const piece=p||S.pieces.find(pp=>!pp.locked && pp.type===t.type);
  if(!piece){ toast('无可提示的块'); return; }
  piece.ox=t.ox; piece.oy=t.oy; piece.rot=t.rot; piece.locked=true; piece.hint=true;
  t.satisfied=true; S.hints--;
  document.getElementById('hintLeft').textContent=S.hints;
  updatePieceEl(piece);
  playSfx('ding');
  toast('已显示一块的正确位置');
  checkWin();
}
function toast(msg){
  const el=document.getElementById('toast'); el.textContent=msg; el.classList.add('show');
  clearTimeout(el._t); el._t=setTimeout(()=>el.classList.remove('show'),1600);
}
function buildLvlBar(){
  const bar=document.getElementById('lvlbar'); bar.innerHTML='';
  // 显示当前关附近 25 关
  const from=Math.max(1,S.level-12), to=Math.min(S.total,from+24);
  for(let i=from;i<=to;i++){
    const b=document.createElement('button');
    b.textContent=i;
    const c=(S.completed[i]||{}).star||0;
    if(i===S.level) b.className='cur'; else if(c>0) b.className='done';
    b.onclick=()=>startLevel(i);
    bar.appendChild(b);
  }
  // 滚到当前
  const cur=bar.querySelector('.cur'); if(cur) cur.scrollIntoView({inline:'center',block:'nearest'});
}
function saveProgress(){
  try{ localStorage.setItem('tangram_progress', JSON.stringify({level:S.level,completed:S.completed})); }catch(e){}
}
function loadProgress(){
  try{ const d=JSON.parse(localStorage.getItem('tangram_progress')||'{}'); if(d.completed) S.completed=d.completed; if(d.level) S.level=d.level; }catch(e){}
}
/* ============ 音频(Web Audio合成) ============ */
let AC=null, master=null, bgmGain=null, bgmTimer=null, bgmOn=false;
function startAudio(){
  if(AC) return;
  try{
    AC=new (window.AudioContext||window.webkitAudioContext)();
    master=AC.createGain(); master.gain.value=0.9; master.connect(AC.destination);
    bgmGain=AC.createGain(); bgmGain.gain.value=0; bgmGain.connect(master);
  }catch(e){ console.warn('audio unavailable',e); }
}
function tone(freq, t0, dur, type, vol, glideTo){
  if(!AC) return;
  const o=AC.createOscillator(), g=AC.createGain();
  o.type=type||'sine'; o.frequency.setValueAtTime(freq, t0);
  if(glideTo) o.frequency.exponentialRampToValueAtTime(glideTo, t0+dur);
  g.gain.setValueAtTime(0, t0);
  g.gain.linearRampToValueAtTime(vol, t0+0.008);
  g.gain.exponentialRampToValueAtTime(0.0001, t0+dur);
  o.connect(g); g.connect(master); o.start(t0); o.stop(t0+dur+0.02);
}
function playSfx(name){
  if(!S.sound||!AC) return;
  const now=AC.currentTime;
  if(name==='pick'){ tone(520, now, 0.06,'square',0.18, 380); }
  else if(name==='ding'){ tone(880, now, 0.5,'sine',0.28); tone(1320, now, 0.5,'sine',0.14); }
  else if(name==='rot'){ tone(300, now, 0.18,'sawtooth',0.12, 620); }
  else if(name==='win'){
    const sc=[523,659,784,1047,1319];
    sc.forEach((f,i)=>tone(f, now+i*0.12, 0.4,'triangle',0.26));
  }
}
// BGM: 舒缓古典吉他风 - 分解和弦循环
const CHORDS=[
  [57,60,64,67],[55,59,62,67],[53,57,60,65],[52,55,60,64] // Am,G,F,E(ish)
];
function startBgm(){
  if(!AC||bgmOn) return;
  bgmOn=true; bgmGain.gain.cancelScheduledValues(AC.currentTime);
  bgmGain.gain.linearRampToValueAtTime(0.16, AC.currentTime+1.5);
  let bar=0;
  function playBar(){
    if(!bgmOn) return;
    const chord=CHORDS[bar%CHORDS.length];
    const t=AC.currentTime;
    // 指弹分解: 低音 + 上行琶音
    const pat=[0,2,1,3,1,2,0,3];
    pat.forEach((idx,i)=>{
      const f=midi2freq(chord[idx]);
      const o=AC.createOscillator(), g=AC.createGain();
      o.type='triangle'; o.frequency.value=f;
      const tt=t+i*0.28;
      g.gain.setValueAtTime(0,tt);
      g.gain.linearRampToValueAtTime(0.22, tt+0.02);
      g.gain.exponentialRampToValueAtTime(0.001, tt+0.5);
      // 略加暖色: 低通
      const lp=AC.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=2200;
      o.connect(g); g.connect(lp); lp.connect(bgmGain);
      o.start(tt); o.stop(tt+0.6);
    });
    bar++;
    bgmTimer=setTimeout(playBar, 0.28*8*1000+40);
  }
  playBar();
}
function stopBgm(){
  bgmOn=false; if(bgmTimer){clearTimeout(bgmTimer);bgmTimer=null;}
  if(bgmGain) bgmGain.gain.linearRampToValueAtTime(0, AC.currentTime+0.4);
}
function midi2freq(m){return 440*Math.pow(2,(m-69)/12);}

/* ============ 初始化与事件绑定 ============ */
function init(){
  loadProgress();
  // 按钮
  document.getElementById('btnHint').onclick=useHint;
  document.getElementById('btnReset').onclick=()=>startLevel(S.level);
  document.getElementById('btnPrev').onclick=()=>startLevel(S.level-1);
  document.getElementById('btnNext').onclick=()=>startLevel(S.level+1);
  document.getElementById('btnSound').onclick=toggleSound;
  // 键盘: R旋转选中, Esc关闭面板
  document.addEventListener('keydown',e=>{
    if(e.key==='r'||e.key==='R'){ const p=S.pieces.find(pp=>!pp.locked); if(p){ rotateAroundCentroid(p,45); updatePieceEl(p); trySnap(p); playSfx('rot'); } }
  });
  // 首次交互启动音频
  const wake=()=>{ startAudio(); if(S.sound) startBgm(); window.removeEventListener('pointerdown',wake); };
  window.addEventListener('pointerdown',wake);
  startLevel(S.level);
}
function toggleSound(){
  S.sound=!S.sound;
  document.getElementById('btnSound').textContent=S.sound?'🔊':'🔇';
  if(S.sound){ startAudio(); startBgm(); } else stopBgm();
}
init();
</script>
